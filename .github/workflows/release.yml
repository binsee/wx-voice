name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-platform:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    continue-on-error: ${{ matrix.experimental == true }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
            cross: false
            exe_suffix: ''

          - platform: linux-arm64
            runner: ubuntu-latest
            cross: true
            cross_cc: aarch64-linux-gnu-gcc
            cross_cxx: aarch64-linux-gnu-g++
            cross_ar: aarch64-linux-gnu-ar
            cross_ranlib: aarch64-linux-gnu-ranlib
            cross_pkg: gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
            exe_suffix: ''

          - platform: darwin-x64
            runner: macos-latest
            cross: false
            exe_suffix: ''
            arch_prefix: 'arch -x86_64'

          - platform: darwin-arm64
            runner: macos-latest
            cross: false
            exe_suffix: ''

          - platform: win32-x64
            runner: windows-latest
            cross: false
            exe_suffix: '.exe'

          - platform: win32-arm64
            runner: windows-11-arm
            cross: false
            exe_suffix: '.exe'
            experimental: true

    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compiler (linux-arm64 only)
        if: matrix.cross == true
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.cross_pkg }}

      - name: Compile Silk SDK (Unix)
        if: runner.os != 'Windows'
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            make -C silk CC=${{ matrix.cross_cc }} CXX=${{ matrix.cross_cxx }} AR=${{ matrix.cross_ar }} RANLIB=${{ matrix.cross_ranlib }}
          else
            ${{ matrix.arch_prefix || '' }} make -C silk
          fi

      - name: Compile Silk SDK (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          choco install mingw -y
          export PATH="/c/ProgramData/chocolatey/lib/mingw/tools/install/mingw64/bin:$PATH"
          make -C silk CC=gcc CXX=g++ AR=ar RANLIB=ranlib lib encoder decoder

      - name: Copy binaries to platform package dir
        shell: bash
        run: |
          PKG_DIR="npm/wx-voice-silk-${{ matrix.platform }}"
          cp silk/encoder${{ matrix.exe_suffix }} $PKG_DIR/encoder${{ matrix.exe_suffix }}
          cp silk/decoder${{ matrix.exe_suffix }} $PKG_DIR/decoder${{ matrix.exe_suffix }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Sync version
        run: node scripts/sync-version.js

      - name: Publish platform package
        shell: bash
        run: |
          PKG_VERSION=$(node -p "require('./npm/wx-voice-silk-${{ matrix.platform }}/package.json').version")
          if npm view @binsee/wx-voice-silk-${{ matrix.platform }}@${PKG_VERSION} version 2>/dev/null; then
            echo "Version ${PKG_VERSION} already published, skipping"
          else
            npm publish npm/wx-voice-silk-${{ matrix.platform }}/ --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-main:
    name: Publish main package
    needs: build-platform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag $TAG does not match package.json version $PKG"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync version
        run: node scripts/sync-version.js

      - name: Build TypeScript
        run: npm run build

      - name: Publish main package
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
